<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0d6efd">
    <title>Offline - Board Game Manager</title>
    <style>
        :root {
            color-scheme: light dark;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            background: Canvas;
            color: CanvasText;
        }

        main {
            width: min(100%, 28rem);
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: clamp(1.75rem, 9vw, 2.4rem);
            line-height: 1.05;
        }

        p {
            margin: 0 0 1.25rem;
            color: color-mix(in srgb, CanvasText 72%, Canvas);
            font-size: 1rem;
            line-height: 1.5;
        }

        button {
            min-height: 2.75rem;
            width: 100%;
            border: 0;
            border-radius: 0.5rem;
            background: #0d6efd;
            color: #fff;
            font: inherit;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <h1>You are offline</h1>
        <p>The app shell is available, but live club data needs a connection. Reconnect and try again.</p>
        <button type="button" onclick="location.reload()">Try again</button>
    </main>
</body>
</html>
